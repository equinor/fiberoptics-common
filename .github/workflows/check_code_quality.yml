name: Check code quality (Ruff, Pytest)

on:
  pull_request:
    types: [review_requested, opened, reopened, synchronize]
    branches: ["main"]

jobs:
  formatter-linter-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]
    defaults:
      run:
        shell: bash
    runs-on: ${{ matrix.os }}

    steps:
      #---------------------------#
      # Check out repo            #
      #---------------------------#
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      #---------------------------#
      # Set up Python             #
      #---------------------------#
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      #---------------------------#
      # Install Poetry            #
      #---------------------------#
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
      #---------------------------#
      # Install dependencies      #
      #---------------------------#
      - name: Install dependencies
        run: poetry install -E "all" --no-interaction --no-cache --with dev
      #---------------------------#
      # Check format              #
      #---------------------------#
      - name: Check formatting
        run: |
          source $VENV
          poetry run ruff format --check --diff .
      #---------------------------#
      # Check lint                #
      #---------------------------#
      - name: Find fixable issues
        run: |
          source $VENV
          poetry run ruff check .
      #---------------------------#
      # Check version consistency #
      #---------------------------#
      - name: Check version consistency
        run: |
          python3 - <<'EOF'
          import tomllib, re, sys

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          source_version = data["tool"]["bumpversion"]["current_version"]
          poetry_version = data["tool"]["poetry"]["version"]

          with open("fiberoptics/common/__init__.py") as f:
              content = f.read()
          match = re.search(r'__version__ = "([^"]+)"', content)
          init_version = match.group(1) if match else None

          errors = []
          if poetry_version != source_version:
              errors.append(
                  f"pyproject.toml [tool.poetry] version '{poetry_version}' "
                  f"!= [tool.bumpversion] current_version '{source_version}'"
              )
          if init_version != source_version:
              errors.append(
                  f"fiberoptics/common/__init__.py __version__ '{init_version}' "
                  f"!= [tool.bumpversion] current_version '{source_version}'"
              )

          if errors:
              print("Version is inconsistent:")
              for e in errors:
                  print(f"  - {e}")
              print("Use bump-my-version to update the version number.")
              sys.exit(1)

          print(f"Version is consistent across all files: {source_version}")
          EOF
      #---------------------------#
      # Check version bumped      #
      #---------------------------#
      - name: Verify version has been updated since main
        run: |
          python3 - <<'EOF'
          import tomllib, subprocess, sys

          with open("pyproject.toml", "rb") as f:
              current = tomllib.load(f)["tool"]["bumpversion"]["current_version"]

          raw = subprocess.check_output(["git", "show", "origin/main:pyproject.toml"])
          main = tomllib.loads(raw.decode())["tool"]["bumpversion"]["current_version"]

          print(f"Version on main:    {main}")
          print(f"Version on branch:  {current}")

          if current == main:
              print("Version has not been updated. Use bump-my-version to increment it.")
              sys.exit(1)

          print(f"Version has been updated: {main} -> {current}")
          EOF
      #---------------------------#
      # Test                      #
      #---------------------------#
      - name: Testing source code
        run: |
          source $VENV
          poetry run pytest --doctest-modules --verbose --cov=./fiberoptics/common .
